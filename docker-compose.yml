services:
  postgres_auth:
    image: postgres:16
    container_name: contenedor_postgres_auth
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ms_auth
    ports:
      - "5433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data

  ms_auth:
    build:
      context: .
      dockerfile: backend/ms_auth/Dockerfile
    container_name: microservicio_auth
    restart: always
    environment:
      NODE_ENV: development

      REST_PORT: 3001
      GRPC_PORT: 50051

      DB_HOST: postgres_auth
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: ms_auth

      JWT_SECRET: super_secret_cambialo_despues
      JWT_EXPIRES_IN: 1h

      JWT_REFRESH_SECRET: super_refresh_secret_cambialo_despues
      JWT_REFRESH_EXPIRES_IN: 7d

      PASSWORD_RESET_EXPIRES_MINUTES: 15

      PROTO_AUTH_PATH: /app/proto/auth.proto
    ports:
      - "3001:3001"
      - "50051:50051"
    depends_on:
      - postgres_auth    

  postgres_periodos:
    image: postgres:16
    container_name: contenedor_postgres_periodos
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ms_periodos
    ports:
      - "5434:5432"
    volumes:
      - postgres_periodos_data:/var/lib/postgresql/data

  ms_periodos:
    build:
      context: .
      dockerfile: backend/ms_periodos/Dockerfile
    container_name: microservicio_periodos
    restart: always
    environment:
      NODE_ENV: development
      DB_HOST: postgres_periodos
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: ms_periodos
    ports:
      - "3000:3000"
    depends_on:
      - postgres_periodos

volumes:
  postgres_auth_data:
  postgres_periodos_data: