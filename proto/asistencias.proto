syntax = "proto3";

package asistencias;

service AsistenciasService {

  rpc GetAsistenciaAlumno (
    AsistenciaAlumnoRequest
  ) returns (
    AsistenciaAlumnoResponse
  );

  rpc GetEstadisticasAsistencia (
    EstadisticasRequest
  ) returns (
    EstadisticasResponse
  );
}

message AsistenciaAlumnoRequest {

  int32 alumnoId = 1;

  int32 materiaId = 2;
}

message Asistencia {

  string id = 1;

  int32 alumnoId = 2;

  int32 materiaId = 3;

  string estado = 4;

  string createdAt = 5;
}

message AsistenciaAlumnoResponse {

  repeated Asistencia asistencias = 1;
}

message EstadisticasRequest {

  int32 materiaId = 1;
}

message EstadisticasResponse {

  int32 presentes = 1;

  int32 retardos = 2;

  int32 total = 3;
}