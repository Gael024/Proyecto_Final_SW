syntax = "proto3";

package periodos;

// Este es el servicio que ms_periodos ofrecerá a los demás
service PeriodosService {
  // Un método para obtener la información del periodo actual
  rpc GetPeriodoActivo (EmptyRequest) returns (PeriodoResponse);

  // Obtener materia por ID/NRC
  rpc GetMateriaById (MateriaRequest) returns (MateriaResponse);

  // Obtener materias por docente
  rpc GetMateriasByDocente (DocenteRequest) returns (MateriasResponse);
}

// Un mensaje vacío porque no necesitamos enviarle datos para preguntar por el activo
message EmptyRequest {}

message MateriaRequest {
  string materiaId = 1;
}

message DocenteRequest {
  int32 docenteId = 1;
}


// La respuesta que devolverá ms_periodos
message PeriodoResponse {
  int32 id = 1;
  string nombre = 2;
  string fechaInicio = 3;
  string fechaFin = 4;
  bool activo = 5;
  repeated MateriaResponse materias = 6;
}

message MateriaResponse {
  int32 id = 1;
  string nrc = 2;
  string nombre = 3;
  string planEstudio = 4;
  int32 docenteId = 5;
}

message MateriasResponse {
  repeated MateriaResponse materias = 1;
}