syntax = "proto3";

package calificaciones;

service CalificacionesService {
  rpc GetConcentrado (MateriaRequest) returns (ConcentradoResponse);
  rpc GetPromedioAlumno (AlumnoMateriaRequest) returns (PromedioResponse);
  rpc GetEstadisticasMateria (MateriaRequest) returns (EstadisticasResponse);
}

message MateriaRequest {
  int32 materiaId = 1;
}

message AlumnoMateriaRequest {
  int32 alumnoId = 1;
  int32 materiaId = 2;
}

// ──── GetConcentrado ────
message ActividadCalif {
  int32  actividadId   = 1;
  string nombre        = 2;
  string categoria     = 3;
  float  puntosMaximos = 4;
  string fechaEntrega  = 5;
  float  calificacion  = 6;
  string comentario    = 7;
  string estado        = 8;
}

message AlumnoCalif {
  int32             alumnoId   = 1;
  int32             materiaId  = 2;
  repeated ActividadCalif actividades = 3;
  float             promedio   = 4;
}

message ConcentradoResponse {
  bool            success = 1;
  repeated AlumnoCalif data    = 2;
  string          message = 3;
}

// ──── GetPromedioAlumno ────
message PromedioResponse {
  bool   success   = 1;
  float  promedio  = 2;
  string message   = 3;
}

// ──── GetEstadisticasMateria ────
message CategoriaStats {
  string categoria      = 1;
  float  promedio       = 2;
  float  calificacionMax = 3;
  float  calificacionMin = 4;
  int32  totalAlumnos   = 5;
}

message EstadisticasResponse {
  bool   success          = 1;
  float  promedioGeneral  = 2;
  int32  totalAlumnos     = 3;
  int32  totalActividades = 4;
  float  calificacionMax  = 5;
  float  calificacionMin  = 6;
  repeated CategoriaStats porCategoria = 7;
  string message          = 8;
}